





<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Hub | 8th Grade Learning Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            background-color: #f8fafc;
            margin: 0;
            padding: 0;
        }
        h1, h2, h3 {
            font-family: 'Poppins', sans-serif;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .page-transition {
            transition: all 0.5s ease-in-out;
        }
        .hidden-page {
            display: none!important;
        
        }
        .active-page {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }
        .subject-btn {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background-color: white;
        }
        .subject-btn:active {
            transform: scale(0.95);
        }
        .material-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <!-- Page 1: Landing (Professional Dark Theme) -->
    <section id="landing-page" class="active-page page-transition min-h-screen flex flex-col items-center justify-center p-6 bg-[#0f172a] text-white relative overflow-hidden">
        <!-- Abstract glowing elements for professional depth -->
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-indigo-900/40 rounded-full blur-[120px]"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-purple-900/30 rounded-full blur-[120px]"></div>
        
        <!-- Grid pattern overlay for technical feel -->
        <div class="absolute inset-0 opacity-[0.05]" style="background-image: radial-gradient(#ffffff 1px, transparent 1px); background-size: 40px 40px;"></div>

        <div class="z-10 text-center max-w-2xl px-4">
           
            <div class="mb-8 flex justify-center">
                <img
                    src="https://yt3.googleusercontent.com/dmgHwf4O6HcneSkNhsaRPme843zUsyINF2kzlmf8R95tBJCzYzdCArRLwAmYa8-0ldzzuZo49g=s160-c-k-c0x00ffffff-no-rj"
                    alt="Study Hub Logo"
                    class="w-28 h-28 rounded-3xl object-cover logo-glow border-2 border-indigo-400/40"
                />
            </div>
            
            <h1 class="text-6xl md:text-8xl font-extrabold mb-6 tracking-tight bg-clip-text text-transparent bg-gradient-to-b from-white to-slate-400">
                Study Hub
            </h1>
            
            <p class="text-lg md:text-xl text-slate-400 leading-relaxed mb-12 font-medium max-w-lg mx-auto">
                🎯 “Ready to Beat the Quiz Challenge?”
                
                 
            </p>
            
            <div class="flex flex-col sm:flex-row gap-4 justify-center items-center">
                <button onclick="navigateTo('subjects-page')" class="group relative px-10 py-4 bg-indigo-600 hover:bg-indigo-500 text-white font-bold rounded-2xl shadow-[0_0_20px_rgba(79,70,229,0.4)] transition-all transform hover:-translate-y-1 active:scale-95 text-lg overflow-hidden">
                    <span class="relative z-10">Explore Dashboard</span>
                    <div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/10 to-transparent -translate-x-full group-hover:translate-x-full transition-transform duration-1000"></div>
                </button>
                <div class="flex items-center gap-2 text-slate-500 text-sm font-semibold">
                    <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                    For Odisha Board (BSE) ଓ Adarsha Vidyalaya (OAV)
                </div>
            </div>
        </div>
        
        <!-- Footer-style detail -->
        <div class="absolute bottom-8 left-0 right-0 text-center text-slate-600 text-[10px] tracking-widest uppercase font-bold">
            8th Grade Academic Standard • v2.0
        </div>
    </section>

    <!-- Page 2: Subjects Selection -->
    <section id="subjects-page" class="hidden-page page-transition min-h-screen p-4 pt-0 md:p-8 md:pt-0 overflow-y-auto bg-gray-100">
        <header class="max-w-6xl mx-auto py-4 flex justify-between items-center border-b border-gray-200 bg-gray-100 sticky top-0 z-20">
            <div>
                <h2 class="text-2xl font-bold text-slate-800">Learning Dashboard</h2>
                <p class="text-xs text-slate-500 font-medium">Pick a subject to explore</p>
            </div>
            <button onclick="navigateTo('landing-page')" class="text-slate-400 hover:text-indigo-600 p-2 rounded-full hover:bg-gray-200 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                </svg>
            </button>
        </header>

        <!-- Subject Grid -->
        <div class="max-w-6xl mx-auto grid grid-cols-2 md:grid-cols-4 gap-3 md:gap-4 mt-6 mb-8" id="subject-grid">
            <!-- Buttons will be generated by JS -->
        </div>

        <!-- Materials Section -->
        <div id="materials-container" class="max-w-4xl mx-auto mt-4 hidden pb-12">
            <div class="flex items-center justify-between mb-4 border-b border-gray-200 pb-2">
                <h3 id="selected-subject-title" class="text-xl font-bold text-indigo-700">Subject Materials</h3>
                <span class="text-xs font-medium text-slate-400 bg-white px-2 py-1 rounded-full uppercase tracking-wider">Topics</span>
            </div>
            <div id="materials-grid" class="flex flex-col gap-3">
                <!-- Cards will be generated by JS -->
            </div>
        </div>
    </section>

    <script>
        const subjects = [
            { id: 'math', name: 'Mathematics', icon: '📐', color: 'text-blue-600', border: 'border-blue-100' },
            { id: 'science', name: 'Science', icon: '🧪', color: 'text-green-600', border: 'border-green-100' },
            { id: 'history', name: 'History', icon: '📜', color: 'text-amber-600', border: 'border-amber-100' },
            { id: 'geography', name: 'Geography', icon: '🌍', color: 'text-cyan-600', border: 'border-cyan-100' },
            { id: 'english', name: 'English', icon: '📖', color: 'text-purple-600', border: 'border-purple-100' },
            { id: 'physics', name: 'Physics', icon: '⚡', color: 'text-red-600', border: 'border-red-100' },
            { id: 'civics', name: 'Civics', icon: '⚖️', color: 'text-indigo-600', border: 'border-indigo-100' },
            { id: 'computer', name: 'Computer', icon: '💻', color: 'text-slate-600', border: 'border-slate-200' }
        ];

        const materialsData = {
            math: [
            { title: 'Squre and Cube', desc: 'Quize 50', url: 'https://learnodishahelp-cmd.github.io/cube8mcq50/' },
                { title: 'Squre and Cube', desc: 'HOT 30', url: 'https://learnodishahelp-cmd.github.io/cube8hot/' },
                { title: 'Parimiti (English)', desc: 'Sarala Parimiti', url: 'https://learnodishahelp-cmd.github.io/parimitieng/' },
                { title: 'Parimiti', desc: 'Sarala Parimiti', url: 'https://learnodishahelp-cmd.github.io/parimitieng/' },
                { title: 'Parimiti', desc: 'Sarala Parimiti', url: 'https://learnodishahelp-cmd.github.io/parimiti8/' },
                //{ title: 'Squre and Cube', desc: 'Quize 50', url: 'https://learnodishahelp-cmd.github.io/cube8mcq50/' },
                //{ title: 'Squre and Cube', desc: 'HOT 30', url: 'https://learnodishahelp-cmd.github.io/cube8hot/' },
                //{ title: 'Mensuration', desc: 'Area and Volume calculations.', url: 'https://example.com/math6' }
            ],
            science: [
                //{ title: 'Cell Structure', desc: 'The fundamental unit of life.', url: 'https://biologydictionary.net/cell-structure/' },
               // { title: 'Force & Pressure', desc: 'How pushes and pulls interact.', url: 'https://www.physicsclassroom.com' },
                { title: 'Microorganisms', desc: '50 Quiz questions set 1', url: 'https://learnodishahelp-cmd.github.io/anujiba1/' },
                { title: 'Anujiba chapter 2', desc: '50 Quiz questions set 2', url: 'https://learnodishahelp-cmd.github.io/anujiba2/' },
                //{ title: 'Sound', desc: 'Production and propagation of sound waves.', url: 'https://example.com/science5' }
            ],
            english: [
                { title: 'The Wit That Won Hearts', desc: 'Master the Summary, Vocabulary, and Grammar', url: 'https://learnodishahelp-cmd.github.io/tenaliquiz/' },
                { title: 'The Wit That Won Hearts', desc: 'Master the Summary, Vocabulary, and Grammar', url: 'https://learnodishahelp-cmd.github.io/tenali/' },
                { title: 'Grammer', desc: 'General', url: 'https://learnodishahelp-cmd.github.io/English-grammerjhia/' },
                { title: 'Grammer', desc: ' General Grammar', url: 'https://learnodishahelp-cmd.github.io/eng-grammar-jhia/' },
                { title: 'Grammer Noun-Adjective', desc: 'General Grammar', url: 'https://learnodishahelp-cmd.github.io/eng-gramm-8/' },
                //{ title: 'Indian National Movement', desc: 'The struggle for independence.', url: 'https://example.com/history3' }
            ],
            sub1: [
                { title: 'The Industrial Revolution', desc: 'Technology shifts in the 18th century.', url: 'https://history.com' },
                { title: 'Ancient Civilizations', desc: 'Rise and fall of the Roman Empire.', url: 'https://nationalgeographic.org' },
                { title: 'Indian National Movement', desc: 'The struggle for independence.', url: 'https://example.com/history3' }
            ],
            sub2: [
                { title: 'The Industrial Revolution', desc: 'Technology shifts in the 18th century.', url: 'https://history.com' },
                { title: 'Ancient Civilizations', desc: 'Rise and fall of the Roman Empire.', url: 'https://nationalgeographic.org' },
                { title: 'Indian National Movement', desc: 'The struggle for independence.', url: 'https://example.com/history3' }
            ],
            sub3: [
                { title: 'The Industrial Revolution', desc: 'Technology shifts in the 18th century.', url: 'https://history.com' },
                { title: 'Ancient Civilizations', desc: 'Rise and fall of the Roman Empire.', url: 'https://nationalgeographic.org' },
                { title: 'Indian National Movement', desc: 'The struggle for independence.', url: 'https://example.com/history3' }
            ],
            sub4: [
                { title: 'The Industrial Revolution', desc: 'Technology shifts in the 18th century.', url: 'https://history.com' },
                { title: 'Ancient Civilizations', desc: 'Rise and fall of the Roman Empire.', url: 'https://nationalgeographic.org' },
                { title: 'Indian National Movement', desc: 'The struggle for independence.', url: 'https://example.com/history3' }
            ],
            sub5: [
                { title: 'Resources', desc: 'Natural and human-made resources.', url: 'https://example.com/geo1' },
                { title: 'Agriculture', desc: 'Types of farming and major crops.', url: 'https://example.com/geo2' }
            ]
        };

        function navigateTo(pageId) {
            const pages = ['landing-page', 'subjects-page'];
            pages.forEach(id => {
                const el = document.getElementById(id);
                if (id === pageId) {
                    el.classList.remove('hidden-page');
                    el.classList.add('active-page');
                } else {
                    el.classList.add('hidden-page');
                    el.classList.remove('active-page');
                }
            });
            if(pageId === 'subjects-page') {
                document.getElementById('materials-container').classList.add('hidden');
                window.scrollTo(0, 0);
            }
        }

        function initSubjects() {
            const grid = document.getElementById('subject-grid');
            subjects.forEach(sub => {
                const btn = document.createElement('button');
                btn.className = `subject-btn flex flex-col items-center justify-center p-4 md:p-5 rounded-2xl border ${sub.border} ${sub.color} shadow-sm hover:shadow-md transition-all`;
                btn.innerHTML = `
                    <span class="text-3xl mb-2">${sub.icon}</span>
                    <span class="font-bold text-xs md:text-sm tracking-tight uppercase">${sub.name}</span>
                `;
                btn.onclick = () => showMaterials(sub.id, sub.name);
                grid.appendChild(btn);
            });
        }

        function showMaterials(subjectId, subjectName) {
            const container = document.getElementById('materials-container');
            const grid = document.getElementById('materials-grid');
            const title = document.getElementById('selected-subject-title');
            
            title.innerText = subjectName;
            grid.innerHTML = '';
            
            const materials = materialsData[subjectId] || [
                { title: 'Coming Soon', desc: 'New content is being prepared.', url: '#' }
            ];

            materials.forEach(item => {
                const card = document.createElement('div');
                card.className = "material-card bg-white p-4 rounded-xl cursor-pointer flex justify-between items-center group transition-all duration-300 border border-gray-200";
                card.innerHTML = `
                    <div>
                        <h4 class="font-bold text-base text-slate-800 group-hover:text-indigo-600 transition-colors">${item.title}</h4>
                        <p class="text-slate-500 text-xs mt-0.5">${item.desc}</p>
                    </div>
                    <div class="bg-indigo-50 p-1.5 rounded-full text-indigo-500 group-hover:bg-indigo-600 group-hover:text-white transition-all">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M10.293 3.293a1 1 0 011.414 0l6 6a1 1 0 010 1.414l-6 6a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-4.293-4.293a1 1 0 010-1.414z" clip-rule="evenodd" />
                        </svg>
                    </div>
                `;
                card.onclick = () => {
                    if(item.url !== '#') window.open(item.url, '_blank');
                };
                grid.appendChild(card);
            });

            container.classList.remove('hidden');
            container.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        window.onload = initSubjects;
    </script>
</body>
</html>
